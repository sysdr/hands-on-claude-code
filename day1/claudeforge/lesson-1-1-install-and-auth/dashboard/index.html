<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaudeForge — Lesson 1.1 Dashboard</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px;
         margin: 32px auto; padding: 0 20px; background: #0f1419; color: #e7e9ea; }
  h1 { font-size: 18px; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
  .card { background: #192734; border-radius: 10px; padding: 14px 16px;
          border: 1px solid #38444d; }
  .card label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #8899a6; display: block; margin-bottom: 6px; }
  .card .val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: #1d9bf0; }
  .card .sub { font-size: 12px; color: #8899a6; margin-top: 6px; word-break: break-all; }
  .err { color: #f4212e; }
  .ok { color: #00ba7c; }
  p.note { font-size: 13px; color: #8899a6; line-height: 1.5; }
  #status { font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<h1>Lesson 1.1 — Live metrics</h1>
<p class="note">Polls <code>/api/metrics</code> every 2s. Run <code>make demo</code> while the server is up to update demo counters. <code>api_hits</code> and <code>uptime_sec</code> update from this page.</p>
<div id="status">Loading…</div>
<div class="grid" id="metrics"></div>
<script>
const keys = [
  ['demo_runs', 'Demo runs'],
  ['verify_pass', 'Verify pass (cum.)'],
  ['verify_fail', 'Verify fail (cum.)'],
  ['api_hits', 'API hits'],
  ['uptime_sec', 'Uptime (s)'],
  ['pid', 'Server PID'],
  ['last_demo_at', 'Last demo (UTC)'],
  ['demo_last_status', 'Demo status'],
  ['server_started_at', 'Server started']
];

function fmt(v) {
  if (v === null || v === undefined) return '—';
  return String(v);
}

async function tick() {
  const el = document.getElementById('status');
  try {
    const r = await fetch('/api/metrics', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    el.textContent = 'Connected — last update ' + new Date().toISOString();
    el.className = '';
    const root = document.getElementById('metrics');
    root.innerHTML = keys.map(([k, label]) => {
      const raw = j[k];
      const isZero = (raw === 0 || raw === '0') && ['demo_runs','verify_pass','verify_fail','api_hits'].includes(k);
      const hint = isZero ? '<span class="sub err">Run ./start.sh then make demo</span>' : '';
      return '<div class="card"><label>' + label + '</label><div class="val">' + fmt(raw) + '</div>' + hint + '</div>';
    }).join('');
  } catch (e) {
    el.textContent = 'Cannot reach dashboard API (start server with ./start.sh): ' + e;
    el.className = 'err';
  }
}
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
